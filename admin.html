<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FleetQR Pro | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 10% 20%,#0f172a,#0a0f1c);min-height:100vh;padding:2rem;}
    .container{max-width:1300px;margin:0 auto;}
    .hero{text-align:center;margin-bottom:2rem;}
    .hero h1{font-size:2.8rem;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .hero p{color:#94a3b8;}
    .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
    .card{background:rgba(15,23,42,0.6);backdrop-filter:blur(16px);border-radius:2rem;border:1px solid rgba(255,255,255,0.1);padding:2rem;transition:transform 0.2s;}
    .card:hover{transform:translateY(-5px);}
    .card-title{font-size:1.5rem;font-weight:600;margin-bottom:1.8rem;display:flex;align-items:center;gap:0.75rem;border-left:4px solid #3b82f6;padding-left:1rem;color:white;}
    .form-group{margin-bottom:1.5rem;}
    label{display:block;margin-bottom:0.5rem;font-weight:500;color:#cbd5e1;}
    input,select{width:100%;padding:1rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;color:white;font-size:1rem;}
    input:focus,select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.3);}
    .phone-group{display:flex;gap:0.5rem;align-items:center;}
    .phone-group select,.phone-group input[type="text"]{width:35%;}
    .phone-group input[type="tel"]{width:65%;}
    button{background:linear-gradient(95deg,#3b82f6,#8b5cf6);width:100%;padding:1rem;border:none;border-radius:1.5rem;font-weight:600;color:white;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    button:hover{transform:scale(1.02);box-shadow:0 10px 20px -5px #3b82f6;}
    .qr-result{background:#0f172a;border-radius:1.5rem;padding:1.5rem;margin-top:1.8rem;text-align:center;border:1px solid #2d3748;}
    .qr-code{background:white;padding:1rem;border-radius:1rem;display:inline-block;margin:1rem 0;}
    .qr-actions{display:flex;gap:1rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;}
    .qr-actions button{width:auto;background:#1e293b;padding:0.6rem 1.2rem;}
    .vehicle-list{max-height:500px;overflow-y:auto;padding-right:0.5rem;}
    .vehicle-item{background:#0f172a;border-radius:1.2rem;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;border:1px solid #1e293b;}
    .vehicle-item:hover{background:#1e293b;border-color:#3b82f6;}
    .vehicle-info h4{color:white;font-weight:600;}
    .vehicle-info p{font-size:0.8rem;color:#94a3b8;margin-top:4px;}
    .vehicle-info .scan-stats{font-size:0.7rem;color:#60a5fa;margin-top:4px;}
    .btn-icon{background:none;color:#94a3b8;border:1px solid #334155;border-radius:0.8rem;padding:0.5rem;width:auto;cursor:pointer;}
    .btn-icon:hover{color:#60a5fa;border-color:#60a5fa;}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#10b981;padding:0.75rem 1.5rem;border-radius:2rem;color:white;font-weight:500;opacity:0;transition:0.3s;z-index:1000;}
    .pagination{display:flex;justify-content:center;gap:1rem;margin-top:1rem;align-items:center;}
    .pagination button{width:auto;padding:0.5rem 1rem;background:#1e293b;}
    .search-container{display:flex;gap:0.5rem;margin-bottom:1rem;}
    .search-container input{flex:1;margin-bottom:0;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:1001;}
    .modal-content{background:#0f172a;border-radius:2rem;padding:2rem;max-width:500px;width:90%;border:1px solid #334155;}
    .modal-content h3{color:white;margin-bottom:1rem;}
    .modal-content input,.modal-content select{margin-bottom:1rem;}
    .modal-buttons{display:flex;gap:1rem;margin-top:1rem;}
    .modal-buttons button{margin:0;}
    .stats-footer{display:flex;justify-content:center;gap:1rem;margin-top:2rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);}
    .stat-item{background:rgba(15,23,42,0.4);backdrop-filter:blur(12px);border-radius:1rem;padding:0.5rem 1rem;display:flex;align-items:center;gap:0.75rem;border:1px solid rgba(255,255,255,0.05);}
    .stat-item i{font-size:1.2rem;color:#60a5fa;}
    .stat-item span{color:#cbd5e1;font-size:0.8rem;}
    .stat-item strong{color:white;font-size:1rem;margin-left:0.25rem;}
    @media (max-width:800px){.dashboard{grid-template-columns:1fr;}body{padding:1rem;}.hero h1{font-size:2rem;}}
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1><i class="fas fa-qrcode"></i> <img src="/logo.png" alt="FleetQR" style="height: 60px; margin-bottom: 10px;"></h1>
    <p>Generate, search, edit, and manage QR stickers</p>
  </div>
  <div class="dashboard">
    <!-- Left: QR Generator -->
    <div class="card">
      <div class="card-title"><i class="fas fa-plus-circle"></i> New Sticker</div>
      <div class="form-group"><label><i class="fas fa-car"></i> Vehicle Number</label><input type="text" id="vehicleNumber" placeholder="e.g., MH12AB1234"></div>
      <div class="form-group"><label><i class="fas fa-user"></i> Owner Name</label><input type="text" id="ownerName" placeholder="Full name"></div>
      <div class="form-group"><label><i class="fas fa-phone-alt"></i> Phone Number</label>
        <div class="phone-group">
          <select id="countryCodeSelect">
            <option value="+374">🇦🇲 +374 (Armenia)</option><option value="+7">🇷🇺 +7 (Russia)</option><option value="+995">🇬🇪 +995 (Georgia)</option>
            <option value="__MANUAL__">✏️ Manual</option>
          </select>
          <input type="text" id="manualCountryCode" placeholder="e.g., +1" style="display:none;">
          <input type="tel" id="phoneNumber" placeholder="Local number">
        </div>
      </div>
      <button id="generateBtn"><i class="fas fa-magic"></i> Generate QR Code</button>
      <div id="qrResult" style="display:none" class="qr-result"><h3><i class="fas fa-check-circle" style="color:#10b981"></i> QR Ready</h3><div id="qrImage" class="qr-code"></div><div class="qr-actions"><button id="copyUrlBtn"><i class="fas fa-copy"></i> Copy URL</button><button id="downloadQrBtn"><i class="fas fa-download"></i> Download PNG</button><button id="printQrBtn"><i class="fas fa-print"></i> Print QR</button></div><p style="font-size:0.8rem;margin-top:12px"><i class="fas fa-shield-alt"></i> Waterproof ready</p></div>
    </div>
    <!-- Right: Vehicle Gallery -->
    <div class="card">
      <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span><i class="fas fa-list-ul"></i> Active Stickers</span>
        <button id="exportBtn" class="btn-icon" style="background:#1E293B; padding:0.4rem 1rem; border-radius:2rem;"><i class="fas fa-download"></i> Export CSV</button>
      </div>
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search by vehicle number, owner name, or phone number...">
        <button id="clearSearchBtn" class="btn-icon" style="background:#1E293B; padding:0 1rem;">✖ Clear</button>
      </div>
      <div id="vehicleList" class="vehicle-list"><div style="text-align:center; padding:2rem; color:#64748b"><i class="fas fa-spinner fa-pulse"></i> Loading fleet...</div></div>
      <div class="pagination" id="paginationControls" style="display:none;">
        <button id="prevPageBtn"><i class="fas fa-chevron-left"></i> Previous</button>
        <span id="pageInfo" style="color:#cbd5e1;">Page 1 / 1</span>
        <button id="nextPageBtn">Next <i class="fas fa-chevron-right"></i></button>
      </div>
      <div style="margin-top:1rem; text-align:right;"><button id="logoutBtn" class="btn-icon" style="background:#dc2626; color:white; padding:0.4rem 1rem; border-radius:2rem;"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
    </div>
  </div>
  <!-- Stats footer -->
  <div class="stats-footer">
    <div class="stat-item"><i class="fas fa-qrcode"></i><span>Total QR codes:</span><strong id="totalQrCount">0</strong></div>
    <div class="stat-item"><i class="fas fa-calendar-day"></i><span>Generated today:</span><strong id="todayQrCount">0</strong></div>
  </div>
</div>
<!-- Edit Modal -->
<div id="editModal" class="modal"><div class="modal-content"><h3>✏️ Edit Vehicle</h3><input type="text" id="editVehicleNumber" placeholder="Vehicle Number"><input type="text" id="editOwnerName" placeholder="Owner Name"><div class="phone-group"><select id="editCountryCodeSelect"><option value="+374">🇦🇲 +374 (Armenia)</option><option value="+7">🇷🇺 +7 (Russia)</option><option value="+995">🇬🇪 +995 (Georgia)</option><option value="__MANUAL__">✏️ Manual</option></select><input type="text" id="editManualCountryCode" placeholder="e.g., +1" style="display:none;"><input type="text" id="editPhoneNumber" placeholder="Phone number"></div><div class="modal-buttons"><button id="saveEditBtn">Save Changes</button><button id="cancelEditBtn" style="background:#475569;">Cancel</button></div></div></div>
<div id="toast" class="toast">✨ QR generated!</div>
<script>
  const token = localStorage.getItem('admin_token');
  if (!token) window.location.href = '/login.html';

  // Country code helpers
  function setupCountryCodeToggling(selectId, manualInputId) {
    const select = document.getElementById(selectId);
    const manual = document.getElementById(manualInputId);
    if (!select || !manual) return;
    function update() { if (select.value === '__MANUAL__') { manual.style.display = 'block'; manual.required = true; } else { manual.style.display = 'none'; manual.required = false; manual.value = ''; } }
    select.addEventListener('change', update); update();
  }
  function getSelectedCountryCode(selectId, manualInputId) {
    const select = document.getElementById(selectId);
    const manual = document.getElementById(manualInputId);
    if (select.value === '__MANUAL__') return manual.value.trim();
    return select.value;
  }
  setupCountryCodeToggling('countryCodeSelect', 'manualCountryCode');
  setupCountryCodeToggling('editCountryCodeSelect', 'editManualCountryCode');

  let currentQrUrl = '', currentQrImageSrc = '';
  let currentPage = 1, totalPages = 1, editingVehicleId = null;
  let currentSearch = '';

  async function loadStats() {
    try { const res = await fetch('/api/stats'); const s = await res.json(); document.getElementById('totalQrCount').innerText = s.total; document.getElementById('todayQrCount').innerText = s.createdToday; } catch(e) { console.error(e); }
  }
  async function loadVehicles(page = 1, search = currentSearch) {
    try {
      const url = `/api/vehicles?page=${page}&limit=10&search=${encodeURIComponent(search)}`;
      const res = await fetch(url);
      const data = await res.json();
      totalPages = data.totalPages;
      currentPage = data.page;
      currentSearch = data.search || '';
      renderVehicleList(data.vehicles);
      updatePagination();
    } catch(e) { console.error(e); }
  }
  function renderVehicleList(vehicles) {
    const container = document.getElementById('vehicleList');
    if (!vehicles.length) { container.innerHTML = '<div style="text-align:center; padding:2rem; color:#64748b"><i class="fas fa-car-side"></i> No matching stickers.</div>'; return; }
    container.innerHTML = vehicles.map(v => {
      const scanInfo = v.scans ? `🔄 ${v.scans} scan${v.scans !== 1 ? 's' : ''}` : '🔄 Not scanned yet';
      const lastScan = v.lastScannedAt ? ` • Last: ${new Date(v.lastScannedAt).toLocaleString()}` : '';
      return `
      <div class="vehicle-item">
        <div class="vehicle-info">
          <h4>${escapeHtml(v.vehicleNumber)}</h4>
          <p>${escapeHtml(v.ownerName)} • ${escapeHtml(v.countryCode)}${escapeHtml(v.phoneNumber)}</p>
          <div class="scan-stats"><i class="fas fa-chart-line"></i> ${scanInfo}${lastScan}</div>
          <small>Created: ${new Date(v.createdAt).toLocaleDateString()}</small>
        </div>
        <div>
          <button class="btn-icon" onclick="viewQR('${escapeHtml(v.qrUrl)}')" title="Show QR"><i class="fas fa-qrcode"></i></button>
          <button class="btn-icon" onclick="copyToClipboard('${escapeHtml(v.qrUrl)}')" title="Copy URL"><i class="fas fa-copy"></i></button>
          <button class="btn-icon" onclick="openEditModal(${v.id}, '${escapeHtml(v.vehicleNumber)}', '${escapeHtml(v.ownerName)}', '${escapeHtml(v.countryCode)}', '${escapeHtml(v.phoneNumber)}')" title="Edit"><i class="fas fa-pencil-alt"></i></button>
          <button class="btn-icon" onclick="deleteVehicle(${v.id})" title="Delete" style="color:#ef4444;"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `}).join('');
  }
  function updatePagination() {
    const controls = document.getElementById('paginationControls');
    const pageInfo = document.getElementById('pageInfo');
    if (totalPages <= 1) { controls.style.display = 'none'; return; }
    controls.style.display = 'flex';
    pageInfo.innerText = `Page ${currentPage} / ${totalPages}`;
    document.getElementById('prevPageBtn').disabled = (currentPage === 1);
    document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);
  }
  document.getElementById('prevPageBtn')?.addEventListener('click', () => { if (currentPage > 1) loadVehicles(currentPage - 1); });
  document.getElementById('nextPageBtn')?.addEventListener('click', () => { if (currentPage < totalPages) loadVehicles(currentPage + 1); });
  document.getElementById('searchInput')?.addEventListener('input', (e) => { currentSearch = e.target.value; loadVehicles(1, currentSearch); });
  document.getElementById('clearSearchBtn')?.addEventListener('click', () => { document.getElementById('searchInput').value = ''; currentSearch = ''; loadVehicles(1, ''); });

  function openEditModal(id, vn, owner, cc, phone) {
    editingVehicleId = id;
    document.getElementById('editVehicleNumber').value = vn;
    document.getElementById('editOwnerName').value = owner;
    document.getElementById('editPhoneNumber').value = phone;
    const editSelect = document.getElementById('editCountryCodeSelect');
    const editManual = document.getElementById('editManualCountryCode');
    const predefined = ['+374', '+7', '+995'];
    if (predefined.includes(cc)) { editSelect.value = cc; editManual.style.display = 'none'; editManual.value = ''; }
    else { editSelect.value = '__MANUAL__'; editManual.style.display = 'block'; editManual.value = cc; }
    document.getElementById('editModal').style.display = 'flex';
  }
  async function saveEdit() {
    const vehicleNumber = document.getElementById('editVehicleNumber').value.trim();
    const ownerName = document.getElementById('editOwnerName').value.trim();
    const phoneNumber = document.getElementById('editPhoneNumber').value.trim();
    let countryCode = getSelectedCountryCode('editCountryCodeSelect', 'editManualCountryCode');
    if (!vehicleNumber || !ownerName || !countryCode || !phoneNumber) { showToast('All fields required'); return; }
    try {
      const res = await fetch(`/api/vehicles/${editingVehicleId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vehicleNumber, ownerName, countryCode, phoneNumber }) });
      const data = await res.json();
      if (data.success) { showToast('✅ Vehicle updated'); document.getElementById('editModal').style.display = 'none'; loadVehicles(currentPage, currentSearch); loadStats(); } else showToast('Update failed');
    } catch(err) { showToast('Network error'); }
  }
  async function deleteVehicle(id) {
    if (!confirm('Permanently delete this sticker?')) return;
    try { const res = await fetch(`/api/vehicles/${id}`, { method: 'DELETE' }); const data = await res.json(); if (data.success) { showToast('🗑️ Deleted'); loadVehicles(currentPage, currentSearch); loadStats(); } else showToast('Delete failed'); } catch(err) { showToast('Network error'); }
  }
  async function generateQR() {
    const vehicleNumber = document.getElementById('vehicleNumber').value.trim();
    const ownerName = document.getElementById('ownerName').value.trim();
    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    let countryCode = getSelectedCountryCode('countryCodeSelect', 'manualCountryCode');
    if (!vehicleNumber || !ownerName || !countryCode || !phoneNumber) { showToast('All fields required'); return; }
    const btn = document.getElementById('generateBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generating...';
    btn.disabled = true;
    try {
      const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vehicleNumber, ownerName, countryCode, phoneNumber }) });
      const data = await res.json();
      if (data.success) {
        currentQrUrl = data.qrUrl; currentQrImageSrc = `https://quickchart.io/qr?text=${encodeURIComponent(currentQrUrl)}&size=250&margin=2`;
        document.getElementById('qrImage').innerHTML = `<img src="${currentQrImageSrc}" style="width:180px">`;
        document.getElementById('qrResult').style.display = 'block';
        showToast('🎉 QR ready');
        document.getElementById('vehicleNumber').value = ''; document.getElementById('ownerName').value = ''; document.getElementById('phoneNumber').value = '';
        document.getElementById('countryCodeSelect').value = '+374'; document.getElementById('manualCountryCode').style.display = 'none'; document.getElementById('manualCountryCode').value = '';
        loadVehicles(currentPage, currentSearch); loadStats();
      } else showToast('Error: ' + (data.error || 'unknown'));
    } catch(err) { showToast('Network error: ' + err.message); }
    finally { btn.innerHTML = '<i class="fas fa-magic"></i> Generate QR Code'; btn.disabled = false; }
  }
  function viewQR(url) { currentQrUrl = url; currentQrImageSrc = `https://quickchart.io/qr?text=${encodeURIComponent(url)}&size=250&margin=2`; document.getElementById('qrImage').innerHTML = `<img src="${currentQrImageSrc}" style="width:180px">`; document.getElementById('qrResult').style.display = 'block'; showToast('QR loaded'); }
  function copyToClipboard(text) { navigator.clipboard.writeText(text); showToast('📋 URL copied'); }
  // FIXED DOWNLOAD (fetch blob to force download)
  async function downloadQR() {
    if (!currentQrImageSrc) { showToast('Generate a QR first'); return; }
    try {
      showToast('Preparing download...');
      const response = await fetch(currentQrImageSrc);
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'vehicle_qr.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast('✅ QR downloaded');
    } catch (err) {
      showToast('Download failed: ' + err.message);
    }
  }
  function printQR() {
    if (!currentQrImageSrc) { showToast('Generate a QR first'); return; }
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head><title>Print QR Code</title>
      <style>body{margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;background:white;}img{max-width:280px;height:auto;border:1px solid #ddd;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}@media print{body{margin:0;padding:0;}img{box-shadow:none;border:none;}}</style>
      </head>
      <body><img src="${currentQrImageSrc}" alt="QR Code"></body>
      </html>
    `);
    printWindow.document.close();
    printWindow.print();
  }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
  async function exportToCSV() {
    try { showToast('Preparing export...'); const res = await fetch('/api/vehicles?limit=10000&search=' + encodeURIComponent(currentSearch)); const data = await res.json(); const vehicles = data.vehicles || []; if (!vehicles.length) { showToast('No vehicles'); return; }
    const headers = ['Vehicle Number','Owner Name','Phone Number','Scans','Last Scan','QR URL','Created At']; 
    const rows = vehicles.map(v => [v.vehicleNumber, v.ownerName, `${v.countryCode}${v.phoneNumber}`, v.scans || 0, v.lastScannedAt ? new Date(v.lastScannedAt).toLocaleString() : '', v.qrUrl, new Date(v.createdAt).toLocaleString()]);
    const csv = [headers.join(','), ...rows.map(row => row.map(cell => `"${cell}"`).join(','))].join('\n');
    const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8'}); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `fleetqr_export_${new Date().toISOString().slice(0,19)}.csv`; link.click(); URL.revokeObjectURL(link.href); showToast(`✅ Exported ${vehicles.length} vehicles`);
    } catch(e) { showToast('Export failed'); }
  }
  function logout() { localStorage.removeItem('admin_token'); showToast('Logged out'); setTimeout(() => window.location.href = '/login.html', 500); }

  document.getElementById('generateBtn').addEventListener('click', generateQR);
  document.getElementById('copyUrlBtn').addEventListener('click', () => copyToClipboard(currentQrUrl));
  document.getElementById('downloadQrBtn').addEventListener('click', downloadQR);
  document.getElementById('printQrBtn').addEventListener('click', printQR);
  document.getElementById('exportBtn').addEventListener('click', exportToCSV);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
  document.getElementById('cancelEditBtn').addEventListener('click', () => document.getElementById('editModal').style.display = 'none');

  loadVehicles(1);
  loadStats();
</script>
</body>
</html>
