<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetQR | Premium Vehicle QR Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #111827 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Two column layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Cards */
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-left: 4px solid #3B82F6;
            padding-left: 1rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px #3B82F6;
        }

        /* QR result */
        .qr-result {
            background: #0F172A;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: center;
            border: 1px solid #334155;
        }

        .qr-code {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            display: inline-block;
            margin: 1rem 0;
        }

        .qr-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .qr-actions button {
            width: auto;
            padding: 0.6rem 1.2rem;
            background: #1E293B;
        }

        .qr-actions button:hover {
            background: #334155;
            transform: none;
        }

        /* Vehicle list */
        .vehicle-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .vehicle-item {
            background: #0F172A;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border: 1px solid #1E293B;
        }

        .vehicle-item:hover {
            background: #1E293B;
            border-color: #3B82F6;
        }

        .vehicle-info h4 {
            font-weight: 600;
            color: white;
        }

        .vehicle-info p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .vehicle-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: none;
            width: auto;
            padding: 0.5rem;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 0.75rem;
        }

        .btn-icon:hover {
            color: #3B82F6;
            border-color: #3B82F6;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10B981;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-qrcode"></i> FleetQR Pro</h1>
        <p>Generate, manage and print QR stickers for your fleet</p>
    </div>

    <div class="dashboard">
        <!-- Left: QR Generator -->
        <div class="card">
            <div class="card-title"><i class="fas fa-plus-circle"></i> New Vehicle Sticker</div>
            <div class="form-group">
                <label><i class="fas fa-car"></i> Vehicle Number</label>
                <input type="text" id="vehicleNumber" placeholder="e.g., MH12AB1234" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Owner Name</label>
                <input type="text" id="ownerName" placeholder="Full name" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Phone (with country code)</label>
                <input type="text" id="phoneNumber" placeholder="+919876543210" autocomplete="off">
            </div>
            <button id="generateBtn"><i class="fas fa-magic"></i> Generate QR Code</button>
            <div id="qrResult" style="display: none;" class="qr-result">
                <h3><i class="fas fa-check-circle" style="color: #10B981"></i> QR Code Ready</h3>
                <div id="qrImage" class="qr-code"></div>
                <div class="qr-actions">
                    <button id="copyUrlBtn"><i class="fas fa-copy"></i> Copy URL</button>
                    <button id="downloadQrBtn"><i class="fas fa-download"></i> Download PNG</button>
                </div>
                <p style="font-size: 0.8rem; margin-top: 0.5rem"><i class="fas fa-shield-alt"></i> High resolution – ready for printing</p>
            </div>
        </div>

        <!-- Right: Vehicle Gallery -->
        <div class="card">
            <div class="card-title"><i class="fas fa-list-ul"></i> Active Stickers</div>
            <div id="vehicleList" class="vehicle-list">
                <div style="text-align: center; padding: 2rem; color: #64748b"><i class="fas fa-spinner fa-pulse"></i> Loading vehicles...</div>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast">✨ QR generated!</div>

<script>
    let currentQrUrl = '';
    let currentQrImageSrc = '';

    // Fetch and display all vehicles
    async function loadVehicles() {
        try {
            const res = await fetch('/api/vehicles');
            const vehicles = await res.json();
            const container = document.getElementById('vehicleList');
            if (!vehicles.length) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #64748b"><i class="fas fa-car-side"></i> No stickers yet. Generate your first!</div>';
                return;
            }
            container.innerHTML = vehicles.map(v => `
                <div class="vehicle-item">
                    <div class="vehicle-info">
                        <h4>${escapeHtml(v.vehicleNumber)}</h4>
                        <p>${escapeHtml(v.ownerName)} • ${escapeHtml(v.phoneNumber)}</p>
                        <small style="color: #475569">${new Date(v.createdAt).toLocaleDateString()}</small>
                    </div>
                    <div class="vehicle-actions">
                        <button class="btn-icon" onclick="viewQR('${escapeHtml(v.qrUrl)}')" title="Show QR"><i class="fas fa-qrcode"></i></button>
                        <button class="btn-icon" onclick="copyToClipboard('${escapeHtml(v.qrUrl)}')" title="Copy URL"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error('Load vehicles error', err);
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function generateQR() {
        const vehicleNumber = document.getElementById('vehicleNumber').value.trim();
        const ownerName = document.getElementById('ownerName').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();

        if (!vehicleNumber || !ownerName || !phoneNumber) {
            alert('Please fill all fields');
            return;
        }

        const btn = document.getElementById('generateBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Generating...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vehicleNumber, ownerName, phoneNumber })
            });
            const data = await res.json();
            if (data.success) {
                currentQrUrl = data.qrUrl;
                const qrImageSrc = `https://quickchart.io/qr?text=${encodeURIComponent(currentQrUrl)}&size=250&margin=2`;
                currentQrImageSrc = qrImageSrc;
                document.getElementById('qrImage').innerHTML = `<img src="${qrImageSrc}" style="width: 180px; border-radius: 12px">`;
                document.getElementById('qrResult').style.display = 'block';
                showToast('🎉 QR code generated!');
                // Clear inputs
                document.getElementById('vehicleNumber').value = '';
                document.getElementById('ownerName').value = '';
                document.getElementById('phoneNumber').value = '';
                loadVehicles(); // refresh list
            } else {
                alert('Error: ' + (data.error || 'Unknown'));
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        } finally {
            btn.innerHTML = '<i class="fas fa-magic"></i> Generate QR Code';
            btn.disabled = false;
        }
    }

    function viewQR(url) {
        currentQrUrl = url;
        const qrImageSrc = `https://quickchart.io/qr?text=${encodeURIComponent(url)}&size=250&margin=2`;
        currentQrImageSrc = qrImageSrc;
        document.getElementById('qrImage').innerHTML = `<img src="${qrImageSrc}" style="width: 180px; border-radius: 12px">`;
        document.getElementById('qrResult').style.display = 'block';
        showToast('QR loaded');
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        showToast('📋 URL copied!');
    }

    function downloadQR() {
        if (currentQrImageSrc) {
            const link = document.createElement('a');
            link.download = 'vehicle_qr.png';
            link.href = currentQrImageSrc;
            link.click();
        } else {
            alert('Generate a QR code first');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // Event listeners
    document.getElementById('generateBtn').addEventListener('click', generateQR);
    document.getElementById('copyUrlBtn').addEventListener('click', () => copyToClipboard(currentQrUrl));
    document.getElementById('downloadQrBtn').addEventListener('click', downloadQR);

    // Load vehicles on page load and every 5 seconds
    loadVehicles();
    setInterval(loadVehicles, 5000);
</script>
</body>
</html>
