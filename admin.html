<!DOCTYPE html>
<html>
<head>
    <title>Vehicle QR Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #1E40AF; color: white; cursor: pointer; }
        .result { margin-top: 20px; }
        img { max-width: 200px; }
    </style>
</head>
<body>
    <h1>🚗 Vehicle QR Generator</h1>
    <input type="text" id="vehicle" placeholder="Vehicle Number">
    <input type="text" id="owner" placeholder="Owner Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <button onclick="generate()">Generate QR Code</button>
    <div id="result" class="result"></div>

    <script>
        async function generate() {
            const vehicleNumber = document.getElementById('vehicle').value;
            const ownerName = document.getElementById('owner').value;
            const phoneNumber = document.getElementById('phone').value;
            if (!vehicleNumber || !ownerName || !phoneNumber) {
                alert('Fill all fields');
                return;
            }
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vehicleNumber, ownerName, phoneNumber })
            });
            const data = await res.json();
            if (data.success) {
                const qrUrl = data.qrUrl;
                const qrImg = `https://quickchart.io/qr?text=${encodeURIComponent(qrUrl)}&size=200`;
                document.getElementById('result').innerHTML = `
                    <h3>✅ QR Ready</h3>
                    <img src="${qrImg}"><br>
                    <a href="${qrImg}" download>Download PNG</a>
                    <p>URL: ${qrUrl}</p>
                `;
            } else {
                alert('Error: ' + (data.error || 'Unknown'));
            }
        }
    </script>
</body>
</html>
