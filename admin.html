<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Motion QR | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 10% 20%,#0f172a,#0a0f1c);min-height:100vh;padding:2rem;}
    .container{max-width:1300px;margin:0 auto;}
    .hero{text-align:center;margin-bottom:2rem;}
    .hero p{color:#94a3b8;margin-top:0.5rem;}
    .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        margin-bottom: 0.3rem;
    }
    .logo-img {
        width: 55px;
        height: auto;
    }
    .hero h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #c084fc, #60a5fa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin: 0;
    }
    .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
    .card{background:rgba(15,23,42,0.6);backdrop-filter:blur(16px);border-radius:2rem;border:1px solid rgba(255,255,255,0.1);padding:2rem;transition:transform 0.2s;}
    .card:hover{transform:translateY(-5px);}
    .card-title{font-size:1.5rem;font-weight:600;margin-bottom:1.8rem;display:flex;align-items:center;gap:0.75rem;border-left:4px solid #3b82f6;padding-left:1rem;color:white;}
    .form-group{margin-bottom:1.5rem;}
    label{display:block;margin-bottom:0.5rem;font-weight:500;color:#cbd5e1;}
    input,select{width:100%;padding:1rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;color:white;font-size:1rem;}
    input:focus,select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.3);}
    .phone-group{display:flex;gap:0.5rem;align-items:center;}
    .phone-group select,.phone-group input[type="text"]{width:35%;}
    .phone-group input[type="tel"]{width:65%;}
    button{background:linear-gradient(95deg,#3b82f6,#8b5cf6);width:100%;padding:1rem;border:none;border-radius:1.5rem;font-weight:600;color:white;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
    button:hover{transform:scale(1.02);box-shadow:0 10px 20px -5px #3b82f6;}
    .qr-result{background:#0f172a;border-radius:1.5rem;padding:1.5rem;margin-top:1.8rem;text-align:center;border:1px solid #2d3748;}
    .qr-code{background:white;padding:1rem;border-radius:1rem;display:inline-block;margin:1rem 0;}
    .qr-actions{display:flex;gap:1rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;}
    .qr-actions button{width:auto;background:#1e293b;padding:0.6rem 1.2rem;}
    .vehicle-list{max-height:500px;overflow-y:auto;padding-right:0.5rem;}
    .vehicle-item{background:#0f172a;border-radius:1.2rem;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;border:1px solid #1e293b;}
    .vehicle-item:hover{background:#1e293b;border-color:#3b82f6;}
    .vehicle-info h4{color:white;font-weight:600;}
    .vehicle-info p{font-size:0.8rem;color:#94a3b8;margin-top:4px;}
    .vehicle-info .scan-stats{font-size:0.7rem;color:#60a5fa;margin-top:4px;}
    .btn-icon{background:none;color:#94a3b8;border:1px solid #334155;border-radius:0.8rem;padding:0.5rem;width:auto;cursor:pointer;}
    .btn-icon:hover{color:#60a5fa;border-color:#60a5fa;}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#10b981;padding:0.75rem 1.5rem;border-radius:2rem;color:white;font-weight:500;opacity:0;transition:0.3s;z-index:1000;}
    .pagination{display:flex;justify-content:center;gap:1rem;margin-top:1rem;align-items:center;}
    .pagination button{width:auto;padding:0.5rem 1rem;background:#1e293b;}
    .search-container{display:flex;gap:0.5rem;margin-bottom:1rem;}
    .search-container input{flex:1;margin-bottom:0;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:1001;}
    .modal-content{background:#0f172a;border-radius:2rem;padding:2rem;max-width:500px;width:90%;border:1px solid #334155;}
    .modal-content h3{color:white;margin-bottom:1rem;}
    .modal-content input,.modal-content select{margin-bottom:1rem;}
    .modal-buttons{display:flex;gap:1rem;margin-top:1rem;}
    .modal-buttons button{margin:0;}
    .stats-footer{display:flex;justify-content:center;gap:1rem;margin-top:2rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);}
    .stat-item{background:rgba(15,23,42,0.4);backdrop-filter:blur(12px);border-radius:1rem;padding:0.5rem 1rem;display:flex;align-items:center;gap:0.75rem;border:1px solid rgba(255,255,255,0.05);}
    .stat-item i{font-size:1.2rem;color:#60a5fa;}
    .stat-item span{color:#cbd5e1;font-size:0.8rem;}
    .stat-item strong{color:white;font-size:1rem;margin-left:0.25rem;}
    @media (max-width:800px){.dashboard{grid-template-columns:1fr;}body{padding:1rem;}.hero .brand h1{font-size:2rem;}.logo-img{width:45px;}}
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="brand">
      <img src="/motion.png" alt="Motion QR Logo" class="logo-img" onerror="this.style.display='none'">
      <h1>Motion QR</h1>
    </div>
    <p>Generate, search, edit, and manage QR stickers</p>
  </div>
  <div class="dashboard"> ... (keep the rest of your admin panel exactly as before) ... </div>
</div>
... (keep the rest of the HTML and scripts identical to your current version)
</body>
</html>
