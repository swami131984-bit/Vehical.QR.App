<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetQR Pro – Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 10% 20%,#0f172a,#0a0f1c);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
        .card{background:rgba(15,23,42,0.7);backdrop-filter:blur(16px);border-radius:2rem;padding:2rem;max-width:450px;width:100%;}
        h1{text-align:center;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        input{width:100%;padding:1rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;color:white;margin:1rem 0;}
        button{width:100%;background:linear-gradient(95deg,#3b82f6,#8b5cf6);padding:1rem;border:none;border-radius:1.5rem;font-weight:600;color:white;cursor:pointer;}
        .error{color:#f87171;margin-top:1rem;text-align:center;}
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 FleetQR Pro Admin</h1>
    <input type="password" id="adminPassword" placeholder="Admin password">
    <button onclick="login()">Login</button>
    <div id="errorMsg" class="error"></div>
</div>
<script>
    async function login() {
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        if (!password) {
            errorDiv.innerText = 'Password required';
            return;
        }
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = 'Logging in...';
        try {
            const res = await fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('admin_token', data.token);
                window.location.href = '/admin.html';
            } else {
                errorDiv.innerText = data.error || 'Login failed';
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        } catch (err) {
            errorDiv.innerText = 'Network error';
            btn.disabled = false;
            btn.innerText = 'Login';
        }
    }
</script>
</body>
</html>
